name: surrol_bipegtransfer_dp3_pointcloud
task_name: bipeg_transfer

data:
  path: collected_data/bipeg_transfer_dp3_pointcloud.npz
  obs_horizon: 2
  action_horizon: 16
  val_ratio: 0.2
  seed: 0
  sample_stride: 1
  normalize: true
  include_rgb: false

shape_meta:
  obs:
    point_cloud:
      shape: [1024, 3]
      type: point_cloud
    agent_pos:
      shape: [14]
      type: low_dim
  action:
    shape: [14]

dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: true
  drop_last: true

policy:
  obs_horizon: 2
  action_horizon: 16
  action_dim: 14
  point_cloud_dim: 3
  agent_pos_dim: 14

training:
  num_epochs: 500
  learning_rate: 0.0001
  weight_decay: 0.000001
  gradient_accumulate_every: 1
  seed: 0
  device: cuda

eval:
  action_mode: absolute
  point_cloud_frame: camera
  num_points: 1024
  mask_mode: target
